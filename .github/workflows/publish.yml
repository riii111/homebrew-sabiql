name: Publish bottles

on:
  workflow_run:
    workflows: ["brew test-bot"]
    types: [completed]

jobs:
  publish:
    if: >-
      github.event.workflow_run.conclusion == 'success'
      && github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-22.04
    permissions:
      contents: write
      pull-requests: write
      actions: read
    steps:
      - name: Get PR number and head branch
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          HEAD_BRANCH="${{ github.event.workflow_run.head_branch }}"
          echo "branch=$HEAD_BRANCH" >> "$GITHUB_OUTPUT"

          PR_NUMBER=$(gh pr view "$HEAD_BRANCH" --repo "$GITHUB_REPOSITORY" --json number --jq '.number' 2>/dev/null || echo "")
          echo "number=$PR_NUMBER" >> "$GITHUB_OUTPUT"

      - name: Set up Homebrew
        if: steps.pr.outputs.number != '' && startsWith(steps.pr.outputs.branch, 'bump-sabiql-')
        uses: Homebrew/actions/setup-homebrew@master

      - name: Set up git
        if: steps.pr.outputs.number != '' && startsWith(steps.pr.outputs.branch, 'bump-sabiql-')
        uses: Homebrew/actions/git-user-config@master

      - name: Pull bottles
        if: steps.pr.outputs.number != '' && startsWith(steps.pr.outputs.branch, 'bump-sabiql-')
        env:
          HOMEBREW_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PULL_REQUEST: ${{ steps.pr.outputs.number }}
        run: brew pr-pull --debug --tap="$GITHUB_REPOSITORY" "$PULL_REQUEST"

      - name: Push commits
        if: steps.pr.outputs.number != '' && startsWith(steps.pr.outputs.branch, 'bump-sabiql-')
        uses: Homebrew/actions/git-try-push@master
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: main
