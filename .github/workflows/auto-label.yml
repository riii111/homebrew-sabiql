name: Auto-label bottle PRs

on:
  workflow_run:
    workflows: ["brew test-bot"]
    types: [completed]

jobs:
  label:
    if: >-
      github.event.workflow_run.conclusion == 'success'
      && github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-22.04
    permissions:
      pull-requests: write
    steps:
      - name: Get PR number and head branch
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_ID: ${{ github.event.workflow_run.id }}
        run: |
          PR=$(gh api "repos/$GITHUB_REPOSITORY/actions/runs/$RUN_ID/attempts/1/jobs" \
            --jq 'empty' 2>/dev/null || true)

          # workflow_run exposes the head branch; retrieve PR from it
          HEAD_BRANCH="${{ github.event.workflow_run.head_branch }}"
          echo "branch=$HEAD_BRANCH" >> "$GITHUB_OUTPUT"

          PR_NUMBER=$(gh pr view "$HEAD_BRANCH" --repo "$GITHUB_REPOSITORY" --json number --jq '.number' 2>/dev/null || echo "")
          echo "number=$PR_NUMBER" >> "$GITHUB_OUTPUT"

      - name: Add pr-pull label
        if: steps.pr.outputs.number != '' && startsWith(steps.pr.outputs.branch, 'bump-sabiql-')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        run: |
          gh label create pr-pull --repo "$GITHUB_REPOSITORY" --force 2>/dev/null || true
          gh pr edit "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --add-label pr-pull
